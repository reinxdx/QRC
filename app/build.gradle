apply plugin: 'com.android.application'

android {
    namespace 'com.qrc.pro'
    compileSdk 34

    defaultConfig {
        applicationId "com.qrc.pro"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

repositories {
    google()
    mavenCentral()
}

dependencies {
    implementation 'com.journeyapps:zxing-android-embedded:4.3.0'
}